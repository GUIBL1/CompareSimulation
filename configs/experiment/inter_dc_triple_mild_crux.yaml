meta:
  name: inter_dc_triple_mild_crux
  version: 1
  description: CRUX baseline on the triple-channel inter-dc topology under mild workload

inputs:
  topology_file: configs/topology/inter_dc_triple_fabric_topology.yaml
  workload_file: configs/workload/inter_dc_mild_workload.yaml

scheduler:
  type: crux
  crux:
    max_priority_levels: 8
    candidate_path_limit: 24
    intensity_window_iterations: 3
  teccl:
    epoch_size_ms: 1.0
    solver_backend: exact_milp_solver
    max_solver_time_ms: 1000
    allow_gpu_replication: true
    allow_switch_replication: false
    enable_gpu_buffer: true
    enable_switch_buffer: false

simulation:
  time_unit: ms
  max_time_ms: 200
  bandwidth_sharing_model: max_min_fair
  random_seed: 20260308
  repetitions: 1

metrics:
  export_csv: true
  export_json: true
  export_trace: true
  output_dir: results/inter_dc_triple_mild_crux
