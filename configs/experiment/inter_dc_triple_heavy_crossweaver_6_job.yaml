meta:
  name: inter_dc_parallel_triple_heavy_crossweaver
  version: 1
  description: CrossWeaver on the triple inter-dc topology under full-duplex heavy
    cross-dc traffic
inputs:
  topology_file: configs/topology/inter_dc_triple_topology.yaml
  workload_file: configs/workload/inter_dc_heavy_workload_6_job.yaml
scheduler:
  type: crossweaver
  crux:
    max_priority_levels: 8
  teccl:
    epoch_size_ms: 100
    solver_backend: highs
  ecmp:
    stable_per_flow: true
  crossweaver:
    slot_ms: 1.0
    headroom_ratio: 0.15
    epsilon: 0.05464
    gamma: 0.12
    stage1_max_iterations: 45
    stage1_binary_search_rounds: 47
    stage1_backoff_ratio: 0.942295
    stage1_backoff_max_rounds: 3
    stage1_safety_margin_ratio: 0.219279
    stage1_rate_smoothing_alpha: 0.451162
    stage1_rate_change_cap_ratio: 0.567383
    stage2_max_iterations: 59
    stage2_binary_search_rounds: 16
    cross_path_ecmp_k: 8
    stage2_path_split_k: 5
    stage2_initial_max_paths: 6
    stage2_max_path_expansion: 23
    stage2_path_expansion_step: 9
    stage2_softmin_temperature: 0.05
    wcmp_update_threshold_l1: 0.128705
    feasibility_tolerance: 1.0e-06
    queue_wait_estimation_mode: observed
simulation:
  time_unit: ms
  max_time_ms: 200000
  bandwidth_sharing_model: max_min_fair
  random_seed: 20260308
  repetitions: 1
metrics:
  export_csv: true
  export_json: true
  export_trace: true
  output_dir: results/inter_dc_parallel_triple_heavy_crossweaver
