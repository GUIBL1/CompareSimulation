meta:
  name: inter_dc_parallel_triple_heavy_crux
  version: 1
  description: CRUX on the triple inter-dc topology under full-duplex heavy cross-dc traffic

inputs:
  topology_file: configs/topology/inter_dc_triple_topology.yaml
  workload_file: configs/workload/inter_dc_heavy_workload_4_job.yaml

scheduler:
  type: crux
  crux:
    hardware_priority_count: 8
    candidate_path_limit: 24
    intensity_window_iterations: 3
    topological_order_sample_count: 8
    intensity_definition_mode: selected_path_max_flow_time
    priority_factor_mode: dlt_aware
    enable_priority_aware_bandwidth: true
  teccl:
    epoch_size_ms: 1.0
    solver_backend: heuristic_solver
    max_solver_time_ms: 1000
    allow_gpu_replication: true
    allow_switch_replication: false
    enable_gpu_buffer: true
    enable_switch_buffer: false

simulation:
  time_unit: ms
  max_time_ms: 15000
  bandwidth_sharing_model: max_min_fair
  random_seed: 20260308
  repetitions: 1

metrics:
  export_csv: true
  export_json: true
  export_trace: true
  output_dir: results/inter_dc_parallel_triple_heavy_crux
