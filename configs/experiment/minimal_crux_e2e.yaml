meta:
  name: minimal_crux_e2e
  version: 1
  description: minimal end-to-end validation for crux on shared public inputs

inputs:
  topology_file: configs/topology/minimal_e2e_topology.yaml
  workload_file: configs/workload/minimal_e2e_workload.yaml

scheduler:
  type: crux
  crux:
    max_priority_levels: 4
    candidate_path_limit: 2
    intensity_window_iterations: 1
  teccl:
    epoch_size_ms: 1
    solver_backend: small_scale_debug_solver
    max_solver_time_ms: 1000
    allow_gpu_replication: true
    allow_switch_replication: false
    enable_gpu_buffer: true
    enable_switch_buffer: false

simulation:
  time_unit: ms
  max_time_ms: 50
  bandwidth_sharing_model: max_min_fair
  random_seed: 7
  repetitions: 1

metrics:
  export_csv: true
  export_json: true
  export_trace: true
  output_dir: results/minimal_crux_e2e