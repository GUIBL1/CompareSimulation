meta:
  name: single_dc_any_crossweaver
  version: 1
  description: CrossWeaver baseline on single DC topology with generated workload

inputs:
  topology_file: configs/topology/single_dc_topology.yaml
  workload_file: configs/workload/generated_workload.yaml

scheduler:
  type: crossweaver
  crux:
    max_priority_levels: 8
  teccl:
    epoch_size_ms: 100
    solver_backend: highs
  ecmp:
    stable_per_flow: true
  crossweaver:
    slot_ms: 1.0
    headroom_ratio: 0.08
    epsilon: 0.08
    gamma: 0.04
    stage1_max_iterations: 24
    stage1_binary_search_rounds: 36
    stage1_backoff_ratio: 0.92
    stage1_backoff_max_rounds: 3
    stage1_safety_margin_ratio: 0.02
    stage1_rate_smoothing_alpha: 0.8
    stage1_rate_change_cap_ratio: 0.8
    stage2_max_iterations: 32
    stage2_binary_search_rounds: 24
    cross_path_ecmp_k: 4
    stage2_path_split_k: 3
    stage2_initial_max_paths: 10
    stage2_max_path_expansion: 20
    stage2_path_expansion_step: 4
    stage2_softmin_temperature: 0.2
    wcmp_update_threshold_l1: 0.03
    feasibility_tolerance: 1.0e-6
    queue_wait_estimation_mode: zero

simulation:
  time_unit: ms
  max_time_ms: 200000
  bandwidth_sharing_model: max_min_fair
  random_seed: 20260308
  repetitions: 1

metrics:
  export_csv: true
  export_json: true
  export_trace: true
  output_dir: results/single_dc_any_crossweaver
