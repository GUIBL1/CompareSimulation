meta:
  name: example_topology
  version: 1
  description: user editable topology input for the simulator

topology:
  mode: generated
  type: fat_tree
  parameters:
    k: 4
    hosts_per_tor: 2
    gpu_per_host: 4

nodes:
  host_count: 16
  switch_count: 20
  explicit_nodes: []

links:
  default_bandwidth_gbps: 100
  default_latency_us: 2
  bidirectional: true
  explicit_links: []
  overrides: []

routing:
  ecmp: true
  max_paths_per_pair: 8
  path_selection_mode: k_shortest

constraints:
  oversubscription_ratio: 1.0
  switch_buffer_mb: 32
  host_nic_bandwidth_gbps: 100
