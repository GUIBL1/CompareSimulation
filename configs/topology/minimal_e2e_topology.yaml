meta:
  name: minimal_e2e_topology
  version: 1
  description: minimal explicit topology shared by crux and teccl end-to-end experiments

topology:
  mode: explicit
  type: minimal_gpu_switch
  parameters: {}

nodes:
  host_count: 0
  switch_count: 1
  gpu_per_host: 0
  explicit_nodes:
    - node_id: gpu_0
      node_type: gpu
    - node_id: gpu_1
      node_type: gpu
    - node_id: gpu_2
      node_type: gpu
    - node_id: switch_0
      node_type: switch

links:
  default_bandwidth_gbps: 100
  default_latency_us: 1000
  bidirectional: true
  explicit_links:
    - src: gpu_0
      dst: switch_0
      latency_us: 1000
    - src: gpu_1
      dst: switch_0
      latency_us: 1000
    - src: gpu_2
      dst: switch_0
      latency_us: 1000
  overrides: []

routing:
  ecmp: false
  max_paths_per_pair: 2
  path_selection_mode: k_shortest

constraints:
  oversubscription_ratio: 1.0
  switch_buffer_mb: 0
  host_nic_bandwidth_gbps: 100